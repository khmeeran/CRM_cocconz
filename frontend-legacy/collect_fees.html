<!DOCTYPE html>
<html lang="en">
<head>
    <script src="auth_check.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocoonz OS - Cashier Desk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .premium-field {
            background: #fff;
            border: 2px solid #F1F5F9;
            transition: all 0.3s ease;
        }
        .premium-field:focus-within {
            border-color: #6366f1;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.1);
        }
    </style>
</head>
<body class="min-h-screen pb-32">
    
    <header class="p-6 flex items-center space-x-4 sticky top-0 bg-white/80 backdrop-blur-xl z-30 border-b border-slate-100">
        <button onclick="location.href='fees.html'" class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 active:scale-90 transition-transform">
            <i class="fas fa-chevron-left"></i>
        </button>
        <div>
            <h1 class="text-xl font-bold tracking-tight">Cashier <span class="text-indigo-600">Desk</span></h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Incoming Fee Collection</p>
        </div>
    </header>

    <main class="p-6 max-w-xl mx-auto">
        
        <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100 space-y-8">
            
            <!-- Selection Engine -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Grade Selection -->
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 block ml-1">1. Choose Grade</label>
                    <div class="premium-field rounded-2xl p-4 flex items-center">
                        <i class="fas fa-layer-group text-slate-300 mr-4"></i>
                        <select id="grade-select" onchange="filterStudentsByGrade()" class="w-full bg-transparent outline-none font-bold text-slate-700">
                            <option value="">-- Select Grade --</option>
                        </select>
                    </div>
                </div>

                <!-- Student Selection -->
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 block ml-1">2. Select Student</label>
                    <div class="premium-field rounded-2xl p-4 flex items-center">
                        <i class="fas fa-user text-slate-300 mr-4"></i>
                        <select id="student-select" onchange="updateBalance()" class="w-full bg-transparent outline-none font-bold text-slate-700">
                            <option value="">-- Choose Student --</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="balance-badge" class="hidden">
                <div class="bg-indigo-50 border border-indigo-100 p-6 rounded-[2rem] flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">Outstanding Balance</p>
                        <h2 class="text-3xl font-black text-indigo-900">₹<span id="current-pending">0</span></h2>
                    </div>
                    <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-indigo-600 shadow-sm">
                        <i class="fas fa-wallet"></i>
                    </div>
                </div>
            </div>

            <!-- Fee Type -->
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 block ml-1">Fee Category</label>
                <div class="premium-field rounded-2xl p-4">
                    <select id="fee-category" class="w-full bg-transparent outline-none font-bold text-slate-700">
                        <option value="TUITION">Tuition Fees</option>
                        <option value="BUS">Bus / Transport</option>
                        <option value="UNIFORM">Uniform & Kits</option>
                        <option value="BOOKS">Books & Stationery</option>
                        <option value="EXAM">Examination Fees</option>
                        <option value="MISC">Other / Miscellaneous</option>
                    </select>
                </div>
            </div>

            <!-- Amount & Mode -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 block ml-1">Amount (₹)</label>
                    <div class="premium-field rounded-2xl p-4">
                        <input type="number" id="pay-amount" placeholder="0.00" class="w-full bg-transparent outline-none font-black text-xl text-slate-800">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 block ml-1">Mode</label>
                    <div class="premium-field rounded-2xl p-4">
                        <select id="pay-mode" class="w-full bg-transparent outline-none font-bold text-slate-700">
                            <option value="CASH">Cash</option>
                            <option value="UPI">UPI / GPay</option>
                            <option value="BANK">Bank Transfer</option>
                            <option value="CHEQUE">Cheque</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Receipt No (Auto-gen placeholder) -->
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 block ml-1">Reference / Receipt No.</label>
                <div class="premium-field rounded-2xl p-4">
                    <input type="text" id="receipt-no" placeholder="Optional reference" class="w-full bg-transparent outline-none font-medium text-slate-600">
                </div>
            </div>

            <button onclick="collectFee()" class="w-full bg-slate-900 text-white py-6 rounded-[2.5rem] font-black text-xl shadow-2xl shadow-slate-900/20 active:scale-95 transition-all">
                Authorize Payment
            </button>

        </div>

    </main>

    <script>
        let allStudents = [];
        let gradeList = [];

        async function init() {
            // Load Classes/Grades
            const classRes = await secureFetch(`${API_BASE}/api/classes`);
            const rawClasses = await classRes.json();
            
            // Extract unique Grade Names (e.g., "1st Std" instead of "1st Std - A")
            const uniqueGrades = [...new Set(rawClasses.map(c => c.name))];
            
            const gradeSelect = document.getElementById('grade-select');
            gradeSelect.innerHTML = '<option value="">-- Select Grade --</option>' + 
                uniqueGrades.map(g => `<option value="${g}">${g}</option>`).join('');

            // Load All Students
            const studentRes = await secureFetch(`${API_BASE}/api/students`);
            allStudents = await studentRes.json();
        }

        function filterStudentsByGrade() {
            const selectedGrade = document.getElementById('grade-select').value;
            const select = document.getElementById('student-select');
            
            if (!selectedGrade) {
                select.innerHTML = '<option value="">-- Choose Student --</option>';
                select.disabled = true;
                updateBalance();
                return;
            }

            const filtered = allStudents.filter(s => s.class_name.startsWith(selectedGrade));
            
            select.disabled = false;
            select.innerHTML = '<option value="">-- Choose Student --</option>' + 
                filtered.map(s => `<option value="${s.id}">${s.name} (${s.class_name})</option>`).join('');
            
            updateBalance(); 
        }

        function updateBalance() {
            const sId = document.getElementById('student-select').value;
            const badge = document.getElementById('balance-badge');
            
            if(!sId) { 
                badge.classList.add('hidden'); 
                return; 
            }
            
            const student = allStudents.find(s => s.id === sId);
            document.getElementById('current-pending').innerText = student.pending_balance.toLocaleString();
            badge.classList.remove('hidden');
        }

        async function collectFee() {
            const sId = document.getElementById('student-select').value;
            const amount = document.getElementById('pay-amount').value;
            const mode = document.getElementById('pay-mode').value;
            const category = document.getElementById('fee-category').value;
            const receipt = document.getElementById('receipt-no').value;

            if(!sId || !amount) return alert("Select student and enter amount");

            const res = await secureFetch(`${API_BASE}/api/fees/pay`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    student_id: sId,
                    amount: amount,
                    payment_mode: mode,
                    receipt_no: `${category}: ${receipt}`
                })
            });

            if(res.ok) {
                alert("Payment Captured Successfully!");
                location.href = '/frontend/fees.html';
            }
        }

        init();
    </script>
</body>
</html>
