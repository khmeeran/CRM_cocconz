<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocoonz OS - User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="auth_check.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F3F4F6; }
        .premium-input {
            background: white;
            border: 1px solid #E5E7EB;
            transition: all 0.3s ease;
        }
        .premium-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.1);
        }
    </style>
</head>
<body class="pb-32">
    
    <header class="p-6 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100">
        <div class="flex items-center space-x-4">
            <button onclick="history.back()" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="text-xl font-black text-gray-800 uppercase tracking-tight">Access Control</h1>
        </div>
    </header>

    <main class="p-6 max-w-2xl mx-auto">
        
        <!-- Add User Form -->
        <section class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100 mb-8">
            <h2 class="text-xl font-black text-gray-800 mb-6">Create System User</h2>
            <form id="addUserForm" class="space-y-5">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2 ml-1">Username</label>
                    <input type="text" id="username" class="w-full premium-input rounded-2xl p-4 outline-none" placeholder="e.g. karthik_teacher" required>
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2 ml-1">Security Key (Password)</label>
                    <input type="password" id="password" class="w-full premium-input rounded-2xl p-4 outline-none" placeholder="••••••••" required>
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2 ml-1">Assigned Role</label>
                    <select id="role" class="w-full premium-input rounded-2xl p-4 outline-none appearance-none" required>
                        <option value="TEACHER">TEACHER</option>
                        <option value="OFFICE">OFFICE STAFF</option>
                        <option value="ACCOUNTANT">ACCOUNTANT</option>
                        <option value="ADMIN">ADMINISTRATOR</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-lg shadow-indigo-100 active:scale-95 transition-all">
                    Initialize Access
                </button>
            </form>
        </section>

        <!-- Existing Users -->
        <section>
            <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-4 pl-1">Authorized Personnel</h3>
            <div id="userList" class="space-y-3">
                <!-- User rows will be injected here -->
            </div>
        </section>

    </main>

    <script>
        const addUserForm = document.getElementById('addUserForm');
        const userList = document.getElementById('userList');

        async function fetchUsers() {
            try {
                const res = await secureFetch(`${API_BASE}/api/users`);
                const users = await res.json();
                
                userList.innerHTML = users.map(user => `
                    <div class="bg-white p-5 rounded-3xl border border-gray-100 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-gray-800">${user.username}</p>
                            <p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mt-0.5">${user.role}</p>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600">
                            <i class="fas fa-shield-halved text-xs"></i>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Fetch users error", err);
            }
        }

        addUserForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            try {
                const res = await secureFetch(`${API_BASE}/api/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert('User created successfully');
                    addUserForm.reset();
                    fetchUsers();
                } else {
                    const data = await res.json();
                    alert(`Error: ${data.detail}`);
                }
            } catch (err) {
                console.error("Create user error", err);
            }
        });

        fetchUsers();
    </script>
</body>
</html>
