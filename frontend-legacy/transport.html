<!DOCTYPE html>
<html lang="en">
<head>
    <script src="auth_check.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocoonz OS - Live Bus Pulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .bus-card { transition: all 0.3s ease; }
        .en-route { background: #EEF2FF; border-color: #6366f1; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.2); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.5; } 70% { transform: scale(1.1); opacity: 0; } 100% { transform: scale(0.95); opacity: 0; } }
    </style>
</head>
<body class="min-h-screen pb-32 text-slate-900">
    
    <header class="p-6 flex items-center space-x-4 sticky top-0 bg-white/80 backdrop-blur-xl z-30 border-b border-slate-100">
        <button onclick="location.href='admin.html'" class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 active:scale-90 transition-transform">
            <i class="fas fa-chevron-left"></i>
        </button>
        <div>
            <h1 class="text-xl font-bold tracking-tight">Live <span class="text-indigo-600">Bus Pulse</span></h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Transport Fleet Monitoring</p>
        </div>
    </header>

    <main class="p-6">
        
        <div id="fleet-stats" class="grid grid-cols-2 gap-4 mb-10">
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-50">
                <p id="total-buses" class="text-3xl font-black text-slate-800">--</p>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Total Fleet</p>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-50">
                <p id="active-trips" class="text-3xl font-black text-indigo-600">--</p>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Active Trips</p>
            </div>
        </div>

        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6 pl-1">Live Fleet Status</h3>
        
        <div id="bus-grid" class="grid grid-cols-1 gap-4">
            <!-- Dynamic Bus Cards -->
        </div>

    </main>

    <script>
        let buses = [];

        async function init() {
            const res = await secureFetch(`${API_BASE}/api/transport/trips`);
            buses = await res.json();
            renderFleet();
        }

        function renderFleet() {
            const grid = document.getElementById('bus-grid');
            let activeCount = 0;
            
            grid.innerHTML = buses.map(b => {
                const isEnRoute = b.status === 'EN_ROUTE';
                if(isEnRoute) activeCount++;
                
                return `
                <div class="bus-card p-6 rounded-[2.5rem] border-2 bg-white ${isEnRoute ? 'en-route' : 'border-slate-50'} shadow-sm">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center space-x-4">
                            <div class="w-14 h-14 ${isEnRoute ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-slate-400'} rounded-2xl flex items-center justify-center text-xl shadow-inner">
                                <i class="fas fa-bus"></i>
                            </div>
                            <div>
                                <h2 class="text-lg font-black text-slate-800">${b.bus_no}</h2>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${b.driver_name}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="flex items-center space-x-2">
                                ${isEnRoute ? '<div class="w-2 h-2 bg-indigo-500 rounded-full animate-ping"></div>' : ''}
                                <span class="text-[10px] font-black ${isEnRoute ? 'text-indigo-600' : 'text-slate-300'} uppercase tracking-widest">${b.status.replace('_',' ')}</span>
                            </div>
                            <p class="text-[10px] font-medium text-slate-400 mt-1">${new Date(b.last_updated).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                        </div>
                    </div>
                    
                    ${isEnRoute ? `
                    <div class="bg-white/50 backdrop-blur rounded-2xl p-4 border border-indigo-100 mb-6">
                        <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">Current Location</p>
                        <p class="font-bold text-indigo-900">${b.current_location || 'Identifying...'}</p>
                    </div>
                    ` : ''}

                    <div class="flex space-x-2">
                        ${!isEnRoute ? `
                        <button onclick="updateStatus('${b.id}', 'EN_ROUTE')" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-slate-900/10 active:scale-95 transition-all">Start Morning Trip</button>
                        ` : `
                        <button onclick="updateStatus('${b.id}', 'IDLE')" class="flex-1 bg-indigo-100 text-indigo-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">End Trip</button>
                        <button onclick="shareLink('${b.bus_no}')" class="w-14 h-14 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center active:scale-95 transition-all"><i class="fab fa-whatsapp"></i></button>
                        `}
                    </div>
                </div>
            `}).join('');

            document.getElementById('total-buses').innerText = buses.length;
            document.getElementById('active-trips').innerText = activeCount;
        }

        async function updateStatus(id, status) {
            await secureFetch(`${API_BASE}/api/transport/trip/${id}/status?status=${status}`, {method: 'POST'});
            init();
        }

        function shareLink(busNo) {
            const msg = encodeURIComponent(`Hi Parent, Bus ${busNo} has started the trip. Track live here: https://cocoonz.ai/track/${busNo}`);
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        }

        init();
        setInterval(init, 30000); // Auto-refresh every 30s
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</body>
</html>
