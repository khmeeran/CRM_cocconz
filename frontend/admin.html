<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocoonz OS - Premium Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="auth_check.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tap-scale { transition: transform 0.1s ease; }
        .tap-scale:active { transform: scale(0.95); }
        .indigo-gradient { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#F3F4F6] min-h-screen text-gray-900 pb-32">
    
    <!-- DEBUG BANNER -->
    <div style="background: #ef4444; color: white; text-align: center; font-weight: bold; padding: 4px; font-size: 12px; position: sticky; top: 0; z-index: 10000;">
        SYSTEM VERSION 1.3 - IF YOU SEE THIS, THE UPDATE IS LIVE
    </div>

    <!-- Top Branding -->
    <header class="flex justify-between items-center sticky top-0 bg-white shadow-2xl z-50 border-b-4 border-indigo-600 p-4 px-6">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 indigo-gradient rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                <i class="fas fa-lobster text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tight text-gray-900 uppercase">Cocoonz <span class="text-indigo-600">OS</span></h1>
                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Enterprise Command v1.3</p>
            </div>
        </div>
        
        <div class="flex items-center space-x-3">
            <!-- Home -->
            <button onclick="location.href='admin.html'" class="flex items-center space-x-2 px-5 py-2.5 rounded-2xl bg-indigo-600 text-white shadow-lg shadow-indigo-200 transition-all tap-scale font-black text-xs uppercase tracking-wider">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </button>
            
            <!-- Users (Visible by Default for Debug, will hide in script if not admin) -->
            <button id="header-admin-gear" onclick="location.href='users.html'" class="flex items-center space-x-2 px-5 py-2.5 rounded-2xl bg-slate-800 text-white shadow-lg shadow-slate-200 transition-all tap-scale font-black text-xs uppercase tracking-wider">
                <i class="fas fa-users-cog"></i>
                <span>Manage Users</span>
            </button>

            <!-- Logout -->
            <button onclick="logout()" class="flex items-center space-x-2 px-5 py-2.5 rounded-2xl bg-white border-2 border-red-100 text-red-500 hover:bg-red-50 transition-all tap-scale font-black text-xs uppercase tracking-wider">
                <i class="fas fa-power-off"></i>
                <span>Exit</span>
            </button>
        </div>
    </header>

    <script>
        function updateDateTime() {
            const now = new Date();
            const dateOptions = { weekday: 'short', month: 'short', day: 'numeric' };
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
            
            document.getElementById('current-date').innerText = now.toLocaleDateString('en-US', dateOptions);
            document.getElementById('current-time').innerText = now.toLocaleTimeString('en-US', timeOptions);
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>

    <main class="px-6">
        
        <!-- Welcome Section -->
        <section class="mb-8">
            <h2 id="welcome-msg" class="text-3xl font-black text-slate-800">Hi, Personnel</h2>
            <p class="text-slate-500 font-medium">Daily operations summary.</p>
        </section>

        <!-- Insights Grid -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-50 flex flex-col justify-between h-44">
                <div class="bg-indigo-50 w-12 h-12 rounded-2xl flex items-center justify-center text-indigo-600 shadow-inner">
                    <i class="fas fa-user-group"></i>
                </div>
                <div>
                    <p id="stat-students" class="text-4xl font-black text-slate-800">--</p>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Students</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-50 flex flex-col justify-between h-44">
                <div class="bg-emerald-50 w-12 h-12 rounded-2xl flex items-center justify-center text-emerald-600 shadow-inner">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div>
                    <p id="stat-attendance" class="text-4xl font-black text-slate-800">--%</p>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Present</p>
                </div>
            </div>
            <div class="col-span-2 bg-slate-900 p-8 rounded-[3rem] shadow-2xl text-white relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Financial Liquidity</p>
                    <h2 id="stat-fees" class="text-4xl font-black tracking-tight">₹ --</h2>
                    <div class="mt-6 flex items-center space-x-2 bg-white/5 border border-white/10 rounded-full px-4 py-2 w-max">
                        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                        <span class="text-[10px] font-bold text-slate-300 uppercase tracking-wider">System Synchronized</span>
                    </div>
                </div>
                <div class="absolute -right-6 -bottom-10 opacity-10 text-[10rem] rotate-12">
                    <i class="fas fa-vault"></i>
                </div>
            </div>
        </div>

        <!-- Master Actions -->
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6 pl-1">Primary Modules</h3>
        <div id="modules-grid" class="grid grid-cols-2 gap-4">
            <!-- Modules will be filtered and injected by JS -->
        </div>

    </main>

    <!-- Navigation Tab Bar REMOVED -->

    <script>
        const role = localStorage.getItem('user_role');
        const welcomeMsg = document.getElementById('welcome-msg');
        const modulesGrid = document.getElementById('modules-grid');
        const adminGear = document.getElementById('header-admin-gear');

        // RBAC Definition for UI
        const modules = [
            { id: 'attendance', name: 'Attendance', icon: 'fa-fingerprint', color: 'blue', path: 'attendance.html', roles: ['ADMIN', 'TEACHER', 'OFFICE'] },
            { id: 'fees', name: 'Fee Center', icon: 'fa-hand-holding-dollar', color: 'emerald', path: 'fees.html', roles: ['ADMIN', 'OFFICE', 'ACCOUNTANT'] },
            { id: 'accounts', name: 'Finance Hub', icon: 'fa-vault', color: 'amber', path: 'accounts.html', roles: ['ADMIN', 'ACCOUNTANT'] },
            { id: 'staff', name: 'Staff Hub', icon: 'fa-users-gear', color: 'purple', path: 'staff.html', roles: ['ADMIN', 'OFFICE'] },
            { id: 'transport', name: 'Transport', icon: 'fa-bus', color: 'pink', path: 'transport.html', roles: ['ADMIN', 'OFFICE', 'TEACHER'] },
            { id: 'students', name: 'Records', icon: 'fa-database', color: 'indigo', path: 'students.html', roles: ['ADMIN', 'OFFICE', 'TEACHER', 'ACCOUNTANT'] }
        ];

        function initializeUI() {
            if (!role) return;
            welcomeMsg.innerText = `Hi, ${role.charAt(0) + role.slice(1).toLowerCase()}`;
            
            if (role === 'ADMIN' && adminGear) {
                adminGear.classList.remove('hidden');
            }

            const allowedModules = modules.filter(m => m.roles.includes(role));
            modulesGrid.innerHTML = allowedModules.map(m => `
                <button onclick="location.href='${m.path}'" class="tap-scale flex flex-col items-center justify-center p-8 bg-white rounded-[2.5rem] shadow-sm border border-transparent hover:border-indigo-100 transition-all">
                    <div class="w-16 h-16 bg-${m.color}-50 rounded-[1.5rem] flex items-center justify-center mb-4 text-${m.color}-500 text-xl">
                        <i class="fas ${m.icon}"></i>
                    </div>
                    <span class="text-sm font-bold text-slate-700">${m.name}</span>
                </button>
            `).join('');
        }

        async function loadStats() {
            try {
                const res = await secureFetch(`${API_BASE}/api/dashboard`);
                if (!res.ok) return;
                const data = await res.json();
                document.getElementById('stat-students').innerText = data.total_students;
                document.getElementById('stat-attendance').innerText = data.attendance_percentage + "%";
                document.getElementById('stat-fees').innerText = "₹" + (data.total_pending_fees / 1000).toFixed(1) + "k";
            } catch (err) {
                console.error("Dashboard stats error", err);
            }
        }

        initializeUI();
        loadStats();
    </script>
</body>
</html>
