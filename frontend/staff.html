<!DOCTYPE html>
<html lang="en">
<head>
    <script src="auth_check.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocoonz OS - Faculty Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-active { background: #6366f1; color: white; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); }
        .staff-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-900 pb-32">
    
    <header class="p-6 flex items-center justify-between sticky top-0 bg-white/80 backdrop-blur-xl z-30 border-b border-slate-100">
        <div class="flex items-center space-x-4">
            <button onclick="location.href='admin.html'" class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 active:scale-90 transition-transform">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div>
                <h1 class="text-xl font-bold tracking-tight">Faculty <span class="text-indigo-600">Vault</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Human Resource Management</p>
            </div>
        </div>
    </header>

    <main class="p-6">
        
        <div class="flex bg-slate-200/50 p-1.5 rounded-[1.5rem] mb-8">
            <button id="btn-att" onclick="switchTab('attendance')" class="flex-1 py-3 rounded-[1.2rem] text-sm font-bold transition-all tab-active">Attendance</button>
            <button id="btn-pay" onclick="switchTab('payroll')" class="flex-1 py-3 rounded-[1.2rem] text-sm font-bold text-slate-500 transition-all">Payroll</button>
        </div>

        <div id="tab-attendance-content" class="space-y-4">
            <div class="flex justify-between items-end mb-4 px-2">
                <div>
                    <h2 class="text-2xl font-black text-slate-800">Roll Call</h2>
                    <p id="current-date" class="text-xs font-medium text-slate-400">--</p>
                </div>
            </div>

            <div id="staff-attendance-grid" class="grid grid-cols-1 gap-4">
                <!-- Dynamic Staff Cards -->
            </div>
            
            <div class="fixed bottom-10 left-6 right-6 z-40">
                <button onclick="saveAttendance()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black text-lg shadow-2xl shadow-slate-900/20 active:scale-95 transition-all">
                    Finalize Attendance
                </button>
            </div>
        </div>

        <div id="tab-payroll-content" class="hidden space-y-4">
            <h2 class="text-2xl font-black text-slate-800 mb-6">Payroll Cycle</h2>
            <div id="staff-payroll-list" class="space-y-4">
                <!-- Dynamic Payroll List -->
            </div>
        </div>

    </main>

    <script>
        let faculty = [];
        let selections = {};

        async function init() {
            document.getElementById('current-date').innerText = new Date().toDateString();
            const res = await secureFetch(`${API_BASE}/api/staff`);
            faculty = await res.json();
            renderAttendance();
            renderPayroll();
        }

        function switchTab(type) {
            const isAtt = type === 'attendance';
            document.getElementById('tab-attendance-content').classList.toggle('hidden', !isAtt);
            document.getElementById('tab-payroll-content').classList.toggle('hidden', isAtt);
            
            document.getElementById('btn-att').className = isAtt ? 'flex-1 py-3 rounded-[1.2rem] text-sm font-bold transition-all tab-active' : 'flex-1 py-3 rounded-[1.2rem] text-sm font-bold text-slate-500 transition-all';
            document.getElementById('btn-pay').className = !isAtt ? 'flex-1 py-3 rounded-[1.2rem] text-sm font-bold transition-all tab-active' : 'flex-1 py-3 rounded-[1.2rem] text-sm font-bold text-slate-500 transition-all';
        }

        function setStatus(id, status) {
            selections[id] = status;
            renderAttendance();
        }

        function renderAttendance() {
            const grid = document.getElementById('staff-attendance-grid');
            grid.innerHTML = faculty.map(f => {
                const s = selections[f.id] || 'P';
                const bg = s === 'P' ? 'bg-white' : (s === 'A' ? 'bg-red-50' : 'bg-amber-50');
                const border = s === 'P' ? 'border-slate-100' : (s === 'A' ? 'border-red-200' : 'border-amber-200');
                
                return `
                <div class="staff-card p-5 rounded-[2rem] border-2 ${bg} ${border} shadow-sm space-y-4">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center font-black text-slate-400">
                                ${f.name.charAt(0)}
                            </div>
                            <div>
                                <p class="font-bold text-slate-800">${f.name}</p>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${f.role}</p>
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="setStatus('${f.id}', 'P')" class="w-10 h-10 rounded-xl font-bold text-xs ${s === 'P' ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-400'}">P</button>
                            <button onclick="setStatus('${f.id}', 'A')" class="w-10 h-10 rounded-xl font-bold text-xs ${s === 'A' ? 'bg-red-500 text-white' : 'bg-slate-100 text-slate-400'}">A</button>
                            <button onclick="setStatus('${f.id}', 'L')" class="w-10 h-10 rounded-xl font-bold text-xs ${s === 'L' ? 'bg-amber-500 text-white' : 'bg-slate-100 text-slate-400'}">L</button>
                        </div>
                    </div>
                    ${s === 'A' && f.role === 'TEACHER' ? `
                    <button onclick="location.href='proxy.html?id=${f.id}&name=${f.name}'" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] shadow-lg shadow-indigo-200 transition-all active:scale-95">
                        <i class="fas fa-shuffle mr-2"></i> Manage Proxies
                    </button>
                    ` : ''}
                </div>
            `}).join('');
        }

        function renderPayroll() {
            const list = document.getElementById('staff-payroll-list');
            list.innerHTML = faculty.map(f => `
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex items-center justify-between">
                    <div>
                        <p class="font-black text-slate-800">${f.name}</p>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Monthly: ₹${parseFloat(f.monthly_salary).toLocaleString()}</p>
                    </div>
                    <button onclick="recordPay('${f.id}', '${f.name}', ${f.monthly_salary})" class="bg-indigo-50 text-indigo-600 px-6 py-3 rounded-2xl font-bold text-xs hover:bg-indigo-600 hover:text-white transition-all">
                        Pay Salary
                    </button>
                </div>
            `).join('');
        }

        async function saveAttendance() {
            const date = new Date().toISOString().split('T')[0];
            const entries = faculty.map(f => ({ staff_id: f.id, status: selections[f.id] || 'P' }));
            const res = await secureFetch(`${API_BASE}/api/staff/attendance/bulk`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ date, entries })
            });
            if (res.ok) alert("Faculty Attendance Synchronized.");
        }

        async function recordPay(id, name, amount) {
            const month = prompt(`Record salary for ${name} - Month:`);
            if(!month) return;
            const res = await secureFetch(`${API_BASE}/api/staff/salary/pay`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ staff_id: id, amount_paid: amount, for_month: month, for_year: "2026" })
            });
            if(res.ok) alert("Salary disbursement recorded.");
        }

        init();
    </script>
</body>
</html>
