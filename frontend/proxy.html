<!DOCTYPE html>
<html lang="en">
<head>
    <script src="auth_check.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocoonz OS - Proxy Pilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
    </style>
</head>
<body class="min-h-screen pb-32 text-slate-900">
    
    <header class="p-6 flex items-center space-x-4 sticky top-0 bg-white/80 backdrop-blur-xl z-30 border-b border-slate-100">
        <button onclick="location.href='staff.html'" class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 active:scale-90 transition-transform">
            <i class="fas fa-chevron-left"></i>
        </button>
        <div>
            <h1 class="text-xl font-bold tracking-tight">Proxy <span class="text-indigo-600">Pilot</span></h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Faculty Substitution Intelligence</p>
        </div>
    </header>

    <main class="p-6">
        
        <div id="absent-warning" class="bg-rose-50 border border-rose-100 p-6 rounded-[2rem] mb-8 hidden">
            <div class="flex items-center space-x-4 mb-4">
                <div class="w-10 h-10 bg-rose-500 rounded-full flex items-center justify-center text-white">
                    <i class="fas fa-user-slash text-sm"></i>
                </div>
                <div>
                    <p class="text-[10px] font-black text-rose-400 uppercase tracking-widest">Alert</p>
                    <h2 class="text-lg font-black text-rose-700"><span id="absent-teacher-name">--</span> is absent today</h2>
                </div>
            </div>
            <p class="text-rose-600/70 text-sm font-medium leading-relaxed">Substitute teachers needed for 6 periods. System identifying available faculty...</p>
        </div>

        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6 pl-1">Required Substitutions</h3>
        
        <div id="periods-list" class="space-y-4">
            <!-- Dynamic Period Slots for Absent Teacher -->
        </div>

    </main>

    <!-- Available Teachers Sheet -->
    <div id="proxy-sheet" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex items-end">
        <div class="bg-white w-full rounded-t-[3rem] p-8 shadow-2xl animate-slide-up">
            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">Available Faculty</h2>
            <p id="sheet-period-label" class="text-indigo-600 font-bold uppercase text-xs tracking-widest mb-8">Period -- Substitutes</p>
            
            <div id="available-list" class="space-y-3 max-h-80 overflow-y-auto no-scrollbar mb-8">
                <!-- Dynamic Available Teachers -->
            </div>

            <button onclick="closeSheet()" class="w-full text-slate-400 font-bold py-2">Cancel Assignment</button>
        </div>
    </div>

    <script>
        let absentTeacherId = null;
        let absentTeacherName = "";
        let periods = [];
        let currentPeriodNumber = null;

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            absentTeacherId = urlParams.get('id');
            absentTeacherName = urlParams.get('name');

            if(absentTeacherId) {
                document.getElementById('absent-warning').classList.remove('hidden');
                document.getElementById('absent-teacher-name').innerText = absentTeacherName;
                await loadTimetable();
            }
        }

        async function loadTimetable() {
            const day = new Date().toLocaleString('en-us', {weekday: 'long'}).toUpperCase();
            const res = await secureFetch(`${API_BASE}/api/proxy/timetable/${absentTeacherId}?day=${day}`);
            periods = await res.json();
            
            const list = document.getElementById('periods-list');
            list.innerHTML = periods.map(p => `
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-50 flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center font-black text-slate-400 text-sm">
                            ${p.period_number}
                        </div>
                        <div>
                            <p class="font-bold text-slate-800">${p.subject}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Class ID: ${p.class_id.slice(0,8)}...</p>
                        </div>
                    </div>
                    <button onclick="openProxySheet(${p.period_number}, '${p.class_id}')" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold text-xs shadow-lg shadow-indigo-100 active:scale-95 transition-all">
                        Assign Proxy
                    </button>
                </div>
            `).join('');
        }

        async function openProxySheet(period, classId) {
            currentPeriodNumber = period;
            currentClassId = classId;
            const day = new Date().toLocaleString('en-us', {weekday: 'long'}).toUpperCase();
            
            document.getElementById('sheet-period-label').innerText = `Period ${period} Substitutes`;
            
            const res = await secureFetch(`${API_BASE}/api/proxy/available-teachers?day=${day}&period=${period}`);
            const available = await res.json();
            
            const list = document.getElementById('available-list');
            if(available.length === 0) {
                list.innerHTML = `<p class="text-center text-slate-400 font-medium py-10">No free teachers found for this period.</p>`;
            } else {
                list.innerHTML = available.map(t => `
                    <div onclick="confirmProxy('${t.id}', '${t.name}')" class="bg-slate-50 p-5 rounded-2xl border border-transparent hover:border-indigo-200 active:bg-indigo-50 transition-all cursor-pointer flex items-center space-x-4">
                        <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-indigo-600 shadow-sm font-black">
                            ${t.name.charAt(0)}
                        </div>
                        <p class="font-bold text-slate-700">${t.name}</p>
                    </div>
                `).join('');
            }
            
            document.getElementById('proxy-sheet').classList.remove('hidden');
        }

        async function confirmProxy(proxyId, proxyName) {
            const res = await secureFetch(`${API_BASE}/api/proxy/assign`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    original_teacher_id: absentTeacherId,
                    proxy_teacher_id: proxyId,
                    period_number: currentPeriodNumber,
                    class_id: currentClassId
                })
            });
            
            if(res.ok) {
                alert(`Proxy Assigned: ${proxyName} will handle Period ${currentPeriodNumber}.`);
                closeSheet();
            }
        }

        function closeSheet() { document.getElementById('proxy-sheet').classList.add('hidden'); }

        init();
    </script>
    <style>
        @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slide-up 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</body>
</html>
