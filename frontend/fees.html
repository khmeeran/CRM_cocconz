<!DOCTYPE html>
<html lang="en">
<head>
    <script src="auth_check.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocoonz OS - Fee Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .premium-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .premium-card:active { transform: scale(0.97); }
        .nudge-friendly { background: #ECFDF5; color: #059669; border-color: #D1FAE5; }
        .nudge-firm { background: #FFFBEB; color: #D97706; border-color: #FEF3C7; }
        .nudge-strict { background: #FEF2F2; color: #DC2626; border-color: #FEE2E2; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#F3F4F6] min-h-screen text-gray-900 pb-32">
    
    <header class="p-6 flex items-center justify-between sticky top-0 bg-[#F3F4F6]/80 backdrop-blur-md z-30">
        <div class="flex items-center space-x-4">
            <button onclick="location.href='admin.html'" class="w-10 h-10 bg-white rounded-xl shadow-sm border border-gray-100 flex items-center justify-center text-gray-400 active:scale-90 transition-transform">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div>
                <h1 class="text-xl font-bold tracking-tight">Fee <span class="text-indigo-600">Center</span></h1>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Revenue & Collections</p>
            </div>
        </div>
        <button onclick="location.href='collect_fees.html'" class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-plus text-xs"></i></button>
    </header>

    <main class="px-6">
        
        <div id="class-pills" class="flex space-x-3 overflow-x-auto pb-6 no-scrollbar">
            <button onclick="selectClass(null)" id="pill-all" class="flex-none px-6 py-3 bg-indigo-600 text-white rounded-2xl shadow-lg shadow-indigo-100 font-bold text-sm">All Classes</button>
        </div>

        <div id="fee-list" class="space-y-4">
            <!-- Dynamic Cards -->
        </div>

    </main>

    <script>
        let students = [];
        let selectedClassId = null;

        async function init() {
            await loadClasses();
            await loadFees();
        }

        async function loadClasses() {
            const res = await secureFetch(`${API_BASE}/api/classes`);
            const classes = await res.json();
            const container = document.getElementById('class-pills');
            classes.forEach(c => {
                container.innerHTML += `<button onclick="selectClass('${c.id}')" id="pill-${c.id}" class="flex-none px-6 py-3 bg-white text-gray-500 rounded-2xl shadow-sm border border-transparent font-bold text-sm hover:border-indigo-100">${c.name}</button>`;
            });
        }

        async function loadFees() {
            const url = selectedClassId ? `${API_BASE}/api/students?class_id=${selectedClassId}` : `${API_BASE}/api/students`;
            const res = await secureFetch(url);
            students = await res.json();
            
            const list = document.getElementById('fee-list');
            list.innerHTML = students.map(s => {
                if(s.pending_balance === 0) return '';
                
                let nudgeClass = '';
                if(s.nudge_level === 'STRICT') nudgeClass = 'nudge-strict';
                else if(s.nudge_level === 'FIRM') nudgeClass = 'nudge-firm';
                else if(s.nudge_level === 'FRIENDLY') nudgeClass = 'nudge-friendly';

                return `
                <div class="premium-card bg-white p-5 rounded-[2rem] shadow-sm border border-gray-50 space-y-4">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 font-black">
                                ${s.name.charAt(0)}
                            </div>
                            <div>
                                <p class="font-bold text-gray-800">${s.name}</p>
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${s.class_name}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-red-600">₹${s.pending_balance.toLocaleString()}</p>
                            <p class="text-[9px] font-bold text-gray-300 uppercase">Pending</p>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between pt-2">
                        <div class="flex items-center space-x-2 ${nudgeClass} px-4 py-2 rounded-xl border text-[10px] font-bold uppercase tracking-wider">
                            <i class="fas fa-clock"></i>
                            <span>${s.nudge_level} Overdue</span>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="location.href='collect_fees.html'" class="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center text-slate-400 hover:bg-indigo-600 hover:text-white transition-all shadow-inner"><i class="fas fa-plus text-xs"></i></button>
                            <button onclick="nudgeParent('${s.name}', '${s.parent_phone}', ${s.pending_balance}, '${s.nudge_level}')" class="w-10 h-10 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-600 hover:bg-emerald-600 hover:text-white transition-all"><i class="fab fa-whatsapp text-sm"></i></button>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function selectClass(id) {
            if (selectedClassId) document.getElementById(`pill-${selectedClassId}`)?.classList.replace('bg-indigo-600', 'bg-white');
            if (selectedClassId) document.getElementById(`pill-${selectedClassId}`)?.classList.replace('text-white', 'text-gray-500');
            document.getElementById('pill-all').classList.replace('bg-indigo-600', 'bg-white');
            document.getElementById('pill-all').classList.replace('text-white', 'text-gray-500');

            selectedClassId = id;
            const activeId = id ? `pill-${id}` : 'pill-all';
            document.getElementById(activeId).classList.replace('bg-white', 'bg-indigo-600');
            document.getElementById(activeId).classList.replace('text-gray-500', 'text-white');
            loadFees();
        }

        function nudgeParent(name, phone, amount, level) {
            let msg = '';
            if(level === 'STRICT') {
                msg = `URGENT: This is from Cocoonz School. Fee payment for ${name} of ₹${amount} is strictly overdue. Please settle this immediately to avoid late fees.`;
            } else if(level === 'FIRM') {
                msg = `Reminder: Fee for ${name} (₹${amount}) is pending for over a week. Kindly process the payment soon.`;
            } else {
                msg = `Hi, friendly reminder from Cocoonz School. Fee for ${name} is due: ₹${amount}. Have a great day!`;
            }
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        init();
    </script>
</body>
</html>
